seed: 42
device: cuda:0
num_steps_per_env: 64
max_iterations: 10000
empirical_normalization: false
policy:
  class_name: ActorCritic
  init_noise_std: 0.45
  actor_hidden_dims:
  - 256
  - 256
  - 128
  critic_hidden_dims:
  - 512
  - 256
  - 128
  - 128
  activation: elu
  min_std: 0.012
algorithm:
  class_name: PPO
  value_loss_coef: 1.0
  use_clipped_value_loss: true
  clip_param: 0.2
  entropy_coef: 0.0015
  num_learning_epochs: 4
  num_mini_batches: 8
  learning_rate: 0.00015
  schedule: adaptive
  gamma: 0.99
  lam: 0.95
  desired_kl: 0.008
  max_grad_norm: 1.0
save_interval: 50
experiment_name: quadcopter_direct_powerloop_speed
run_name: speed_ft_10k_4096
logger: wandb
neptune_project: isaaclab
wandb_project: ese651_quadcopter
resume: true
load_run: 2026-03-30_02-01-45
load_checkpoint: best_model.pt
